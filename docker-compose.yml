# Root Docker Compose - Production-Grade LHAS Stack
# This orchestrates Frontend, Backend, and PostgreSQL
# Run from project root: docker-compose up --build
#
# Services communicate via Docker internal networking:
# - backend connects to postgres via "postgres" hostname
# - frontend connects to backend via "backend" hostname
# - All use service names, NOT localhost

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: lhas-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aditya}
      POSTGRES_DB: ${POSTGRES_DB:-LHAS}
      # Default values for development if .env not present
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lhas-network
    restart: unless-stopped

  # FastAPI Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lhas-backend
    env_file:
      - .env
    environment:
      # Database connection - use service name 'postgres' not localhost
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-aditya}@postgres:5432/${POSTGRES_DB:-LHAS}
      
      # CORS - include all frontend URLs
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://frontend:3000,http://frontend:80
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Backend storage volume for uploaded files, FAISS indices, etc.
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lhas-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # React Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: lhas-frontend
    env_file:
      - .env
    environment:
      # Frontend API URL - browser on host machine reaches backend via port mapping
      VITE_API_URL: http://localhost:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lhas-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # pgAdmin - Database Administration UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lhas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@lhas.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lhas-network
    restart: unless-stopped

  # NOTE: Uncomment below for production with Nginx reverse proxy
  # nginx:
  #   image: nginx:${NGINX_VERSION:-alpine}
  #   container_name: lhas-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #     - nginx_logs:/var/log/nginx
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - lhas-network
  #   restart: unless-stopped

volumes:
  # PostgreSQL data persistence
  postgres_data:
    driver: local

  # Backend storage for uploaded files, indices, etc.
  backend_storage:
    driver: local

  # Nginx logs (optional)
  # nginx_logs:
  #   driver: local

networks:
  # Bridge network for service-to-service communication
  lhas-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
